<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Incoming Requests - Drivers Connect</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #f4f6f8;
    background-image: radial-gradient(circle at top right, #e0e7ff 0%, #f4f6f8 100%);
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 15px rgba(0,0,0,0.07);
}

.header-btn {
    background: #f1f5f9;
    border: none;
    padding: 10px 14px;
    border-radius: 12px;
    cursor: pointer;
}

.header-center {
    background: linear-gradient(135deg, #6366f1, #a855f7);
    color: white;
    padding: 10px 14px;
    border-radius: 50%;
    font-size: 18px;
}

.profile-btn {
    background: linear-gradient(135deg, #6366f1, #a855f7);
    color: white;
    border: none;
    padding: 10px 14px;
    border-radius: 12px;
    cursor: pointer;
}

/* SECTION */
.section {
    width: 90%;
    margin: 20px auto;
}

.section-header {
    margin-bottom: 15px;
}

.section-header h3 {
    font-size: 22px;
    color: #1e293b;
}

.section-header p {
    color: #64748b;
    font-size: 14px;
}

/* REQUEST CARD */
.request-card {
    background: white;
    padding: 22px;
    border-radius: 20px;
    box-shadow: 0 6px 25px rgba(0,0,0,0.06);
    margin-bottom: 15px;
    border: 1px solid #f1f5f9;
    transition: 0.3s;
}

.request-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
}

.customer-name {
    font-weight: 700;
    font-size: 17px;
    margin-bottom: 6px;
}

.route {
    font-size: 14px;
    color: #64748b;
    margin-bottom: 8px;
}

.meta {
    font-size: 13px;
    color: #94a3b8;
    margin-bottom: 10px;
}

.amount {
    font-weight: bold;
    color: #6366f1;
    font-size: 18px;
    margin-bottom: 12px;
}

/* BUTTONS */
.btn-group {
    display: flex;
    gap: 10px;
}

.accept-btn {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #10b981, #059669);
    color: white;
    cursor: pointer;
}

.reject-btn {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #ef4444, #dc2626);
    color: white;
    cursor: pointer;
}

/* STATUS */
.status {
    margin-top: 10px;
    font-size: 14px;
    font-weight: 600;
}

.accepted { color: #10b981; }
.rejected { color: #ef4444; }

.empty-state {
    text-align: center;
    padding: 40px;
    color: #94a3b8;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    <button class="header-btn" onclick="window.location.href='landing.html'">← Back</button>
    <div class="header-center">🚗</div>
    <button class="profile-btn" onclick="window.location.href='profile.html'">👤</button>
</div>

<!-- SECTION -->
<div class="section">
    <div class="section-header">
        <h3>Incoming Requests</h3>
        <p id="request-count"></p>
    </div>

    <div id="requests-section"></div>
</div>

<script>

/* Sample requests (later replace with API) */
let requests = [
    {
        customer: "Amit Sharma",
        pickup: "MG Road",
        drop: "Airport",
        slot: "9 AM - 12 PM",
        hours: 3,
        amount: 450
    },
    {
        customer: "Priya Verma",
        pickup: "Whitefield",
        drop: "Electronic City",
        slot: "2 PM - 6 PM",
        hours: 4,
        amount: 600
    }
];

/* LOAD REQUESTS */
function loadRequests() {
    let html = "";

    document.getElementById("request-count").innerText =
        requests.length + " new requests";

    if (requests.length === 0) {
        html = `<div class="empty-state">No requests available</div>`;
    }

    requests.forEach((req, index) => {
        html += `
        <div class="request-card">
            <div class="customer-name">${req.customer}</div>
            <div class="route">📍 ${req.pickup} → 📌 ${req.drop}</div>
            <div class="meta">⏰ ${req.slot} | ${req.hours} hrs</div>
            <div class="amount">₹ ${req.amount}</div>

            <div class="btn-group">
                <button class="accept-btn" onclick="updateStatus(${index}, 'accepted')">Accept</button>
                <button class="reject-btn" onclick="updateStatus(${index}, 'rejected')">Reject</button>
            </div>

            <div class="status" id="status-${index}"></div>
        </div>
        `;
    });

    document.getElementById("requests-section").innerHTML = html;
}

/* ACCEPT / REJECT */
function updateStatus(index, status) {
    const el = document.getElementById("status-" + index);

    if (status === "accepted") {
        el.innerText = "Request Accepted ✅ Redirecting...";
        el.className = "status accepted";

        setTimeout(() => {
            window.location.href = "paymentdone.html";
        }, 3000);

    } else {
        el.innerText = "Request Rejected ❌";
        el.className = "status rejected";

        setTimeout(() => {
            window.location.href = "requestrejected.html";
        }, 2000);
    }
}

loadRequests();
</script>

</body>
</html>
