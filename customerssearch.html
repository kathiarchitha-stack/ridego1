<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incoming Requests - Drivers Connect</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
            background-size: 200% 200%;
            animation: bgPan 10s ease infinite;
            color: #f8fafc;
            min-height: 100vh;
        }

        @keyframes bgPan {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        /* HEADER */

        .header {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.35);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 15px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .header-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .header-center {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.4);
        }

        .profile-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 15px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .profile-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* SECTION */

        .section {
            width: 100%;
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
        }

        .section-header {
            margin-bottom: 25px;
        }

        .section-header h3 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .section-header p {
            color: #94a3b8;
            font-size: 14px;
        }

        /* REQUEST CARD */

        .request-card {
            background: rgba(30, 41, 59, 0.75);
            backdrop-filter: blur(20px);
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .request-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
            border-color: rgba(56, 189, 248, 0.3);
        }

        .customer-name {
            font-weight: 700;
            font-size: 19px;
            margin-bottom: 6px;
            color: #f8fafc;
        }

        .route {
            font-size: 14px;
            color: #cbd5e1;
            margin-bottom: 8px;
        }

        .meta {
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 14px;
        }

        .amount {
            font-weight: bold;
            color: #38bdf8;
            font-size: 20px;
            margin-bottom: 16px;
        }

        /* BUTTONS */

        .btn-group {
            display: flex;
            gap: 12px;
        }

        .accept-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3);
            transition: all 0.3s;
        }

        .accept-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.5);
        }

        .reject-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: white;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3);
            transition: all 0.3s;
        }

        .reject-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(239, 68, 68, 0.5);
        }

        /* STATUS */

        .status {
            margin-top: 15px;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
        }

        .accepted {
            color: #4ade80;
        }

        .rejected {
            color: #f87171;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #94a3b8;
            background: rgba(30, 41, 59, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .empty-state .icon {
            font-size: 50px;
            margin-bottom: 15px;
            display: block;
        }
    </style>
</head>

<body>

    <!-- HEADER -->

    <div class="header">
        <button class="header-btn" onclick="window.location.href='login1.html'">← Back</button>
        <div class="header-center" style="background:transparent; box-shadow:none;"><img src="logo.png" alt="Logo" style="height:100%; width:100%; object-fit:contain; border-radius:50%;"></div>
        <button class="profile-btn" onclick="window.location.href='profile.html'">👤</button>
    </div>

    <!-- SECTION -->

    <div class="section">

        <div class="section-header">
            <h3>Incoming Requests</h3>
            <p id="request-count"></p>
        </div>

        <div id="requests-section"></div>

    </div>

    <script>

        /* Auth Check */

        const loggedUser = JSON.parse(localStorage.getItem("loggedUser"));

        if (!loggedUser || loggedUser.type !== "driver") {
            window.location.href = "signin.html";
        }

        /* LOAD REQUESTS */

        let userBookings = JSON.parse(localStorage.getItem("userBookings")) || [];
        let allUsers = JSON.parse(localStorage.getItem("users")) || [];

        /* DRIVER CONTEXT */

        let currentDriverName = "Driver";

        if (loggedUser) {
            let fullUser = allUsers.find(u => u.email === loggedUser.email) || loggedUser;
            currentDriverName = fullUser.name;
        }

        function loadRequests() {

            userBookings = JSON.parse(localStorage.getItem("userBookings")) || [];

            let myPendingRequests = userBookings.filter(
                b => b.driver === currentDriverName && b.status === "pending"
            );

            /* SAMPLE DATA IF EMPTY */

            if (myPendingRequests.length === 0) {

                myPendingRequests = [

                    { txnId: "SAMPLE-001", customerName: "Rahul Sharma", pickup: "MG Road, Bengaluru", drop: "Kempegowda Airport", date: "Today", amount: 750 },

                    { txnId: "SAMPLE-002", customerName: "Priya Nair", pickup: "Whitefield", drop: "Electronic City", date: "Today", amount: 480 },

                    { txnId: "SAMPLE-003", customerName: "Amit Verma", pickup: "Koramangala", drop: "Hebbal", date: "Today", amount: 320 },

                    { txnId: "SAMPLE-004", customerName: "Sneha Reddy", pickup: "Indiranagar", drop: "Yelahanka", date: "Today", amount: 540 },

                    { txnId: "SAMPLE-005", customerName: "Vikram Singh", pickup: "JP Nagar", drop: "Cubbon Park", date: "Today", amount: 275 }

                ];

            }

            let html = "";
            window.renderedRequests = window.renderedRequests || {};

            document.getElementById("request-count").innerText =
                myPendingRequests.length + " new requests available";

            if (myPendingRequests.length === 0) {

                html = `
<div class="empty-state">
<span class="icon">📫</span>
<p>No new requests available at the moment.</p>
</div>
`;

            }

            myPendingRequests.forEach((req) => {

                window.renderedRequests[req.txnId] = req;
                let amount = req.amount || "0";

                html += `

<div class="request-card" id="req-${req.txnId}">

<div class="customer-name">${req.customerName || "Customer"}</div>

<div class="route">📍 ${req.pickup || "N/A"} → 📌 ${req.drop || "N/A"}</div>

<div class="meta">📅 ${req.date || "Today"} | Expected 🚗</div>

<div class="amount">₹ ${amount}</div>

<div class="btn-group">

<button class="accept-btn"
onclick="updateStatus('${req.txnId}','accepted')">
Accept
</button>

<button class="reject-btn"
onclick="updateStatus('${req.txnId}','rejected')">
Reject
</button>

</div>

<div class="status" id="status-${req.txnId}"></div>

</div>

`;

            });

            document.getElementById("requests-section").innerHTML = html;

        }

        /* ACCEPT / REJECT */

        function updateStatus(txnId, status) {

            let userBookings = JSON.parse(localStorage.getItem("userBookings")) || [];
            let idx = userBookings.findIndex(b => b.txnId === txnId);

            if (idx !== -1) {
                userBookings[idx].status = status;
                localStorage.setItem("userBookings", JSON.stringify(userBookings));
            }

            let req = window.renderedRequests ? window.renderedRequests[txnId] : null;
            if (status === "accepted" && req) {
                localStorage.setItem("lastTxnId", req.txnId);
                localStorage.setItem("lastAmount", req.amount || "0");
                localStorage.setItem("lastDriver", currentDriverName);
                localStorage.setItem("pickupLocation", req.pickup || "-");
                localStorage.setItem("dropLocation", req.drop || "-");
            }

            const el = document.getElementById("status-" + txnId);

            if (status === "accepted") {

                el.innerText = "Request Accepted ✅";

                el.className = "status accepted";

                /* WAIT 5 SECONDS THEN REDIRECT */

                setTimeout(() => {

                    window.location.href = "paymentdone.html";

                }, 5000);

            }

            else {

                el.innerText = "Request Rejected ❌";

                el.className = "status rejected";

                setTimeout(() => {

                    loadRequests();

                }, 800);

            }

        }

        loadRequests();

    </script>

</body>

</html>
