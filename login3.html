<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bank Details</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: #f4f6f8;
    background-image: radial-gradient(circle at top right, #e0e7ff 0%, #f4f6f8 100%);
    color: #0f172a;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* Header */
.header {
    height: 70px;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: blur(10px);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 30px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    position: sticky;
    top: 0;
    z-index: 100;
}

.header-btn {
    background: #f1f5f9;
    border: none;
    padding: 10px 14px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
    font-weight: 500;
}

.header-btn:hover { background: #e2e8f0; }

.logo {
    background: linear-gradient(135deg, #6366f1, #a855f7);
    color: white;
    padding: 12px;
    border-radius: 50%;
    font-size: 18px;
    box-shadow: 0 4px 10px rgba(99, 102, 241, 0.3);
}

/* Main Container */
.container {
    max-width: 650px;
    width: 90%;
    margin: 60px auto;
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(12px);
    padding: 50px;
    border-radius: 24px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.1);
    border: 1px solid rgba(255, 255, 255, 0.4);
}

/* Title Section */
.title-section {
    text-align: center;
    margin-bottom: 40px;
}

.icon-box {
    width: 80px;
    height: 80px;
    margin: 0 auto 20px auto;
    background: linear-gradient(135deg, #e0e7ff, #ede9fe);
    display: flex;
    justify-content: center;
    align-items: center;
    border-radius: 20px;
    font-size: 32px;
    color: #6366f1;
    box-shadow: 0 10px 25px rgba(99, 102, 241, 0.15);
}

.title-section h2 {
    margin-bottom: 8px;
    font-size: 26px;
    color: #1e293b;
}

.subtitle {
    color: #64748b;
    font-size: 15px;
}

/* Form */
.form-group {
    margin-bottom: 25px;
}

.form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: #1e293b;
    font-size: 15px;
}

.input-box {
    position: relative;
}

.input-box input {
    width: 100%;
    padding: 16px 15px 16px 45px;
    border-radius: 14px;
    border: 2px solid #e2e8f0;
    font-size: 15px;
    outline: none;
    transition: all 0.3s ease;
    background: transparent;
    font-family: 'Poppins', sans-serif;
}

.input-box input:focus {
    border-color: #a855f7;
    box-shadow: 0 0 0 4px rgba(168, 85, 247, 0.1);
    background: white;
}

.input-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 18px;
    color: #94a3b8;
}

/* Buttons */
.primary-btn {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 14px;
    background: linear-gradient(135deg, #6366f1, #a855f7);
    color: white;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 20px;
    transition: all 0.3s ease;
    box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
}

.primary-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 15px 35px rgba(99, 102, 241, 0.5);
}

.back-btn {
    width: 100%;
    margin-top: 20px;
    padding: 16px;
    background: transparent;
    border: 2px solid #e2e8f0;
    color: #64748b;
    border-radius: 14px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 600;
    transition: all 0.3s ease;
}

.back-btn:hover {
    background: #f1f5f9;
    color: #0f172a;
}
</style>

</head>
<body>

<!-- Header -->
<div class="header">
    <button class="header-btn" onclick="window.history.back()">←</button>
    <div class="logo">🚗</div>
    <button class="header-btn">👤</button>
</div>

<!-- Main Card -->
<div class="container">

    <div class="title-section">
        <div class="icon-box">💳</div>
        <h2>UPI Settings</h2>
        <p class="subtitle">Link your UPI ID to receive secure driver payments directly</p>
    </div>

    <div class="form-group">
        <label>UPI ID</label>
        <div class="input-box">
            <span class="input-icon">📱</span>
            <input type="text" id="upiId" placeholder="e.g., yourname@okhdfcbank">
        </div>
    </div>

    <div class="form-group">
        <label>Account Holder Name</label>
        <div class="input-box">
            <span class="input-icon">👤</span>
            <input type="text" id="accountName" placeholder="As per bank records">
        </div>
    </div>

    <button class="primary-btn" onclick="submitBankDetails()">Save UPI ID</button>
    
    <button class="back-btn" onclick="window.history.back()">Cancel</button>

</div>

<script>
function submitBankDetails() {
    let upi = document.getElementById("upiId").value.trim();
    let name = document.getElementById("accountName").value.trim();

    if(upi === "" || name === "") {
        alert("⚠ Please fill out all UPI details before continuing.");
        return;
    }

    alert("✅ UPI ID Linked Successfully!");

    // Redirect after 1 second
    setTimeout(function(){
        window.history.back();
    }, 1000);
}
</script>

</body>
</html>
