<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Bookings - Drivers Connect</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

body {
    background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
    background-size: 200% 200%;
    animation: bgPan 10s ease infinite;
    color: #f8fafc;
    min-height: 100vh;
}

@keyframes bgPan {
  0%   { background-position: 0% 50%; }
  50%  { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

.header {
    background: rgba(15,23,42,0.7);
    backdrop-filter: blur(15px);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 30px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    border-bottom: 1px solid rgba(255,255,255,0.05);
    position: sticky; top: 0; z-index: 100;
}

.back-btn {
    background: rgba(255,255,255,0.1);
    color: white;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 8px 15px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 14px;
    transition: all 0.3s;
}
.back-btn:hover { background: rgba(255,255,255,0.2); }

.logo {
    width: 45px; height: 45px;
    background: linear-gradient(135deg, #38bdf8, #818cf8);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 0 15px rgba(56,189,248,0.4);
}

.profile-btn {
    background: rgba(255,255,255,0.1);
    color: white;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 8px 15px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.3s;
}
.profile-btn:hover { background: rgba(255,255,255,0.2); }

.container { padding: 30px 20px; max-width: 620px; margin: 0 auto; }

h2 { margin-bottom: 8px; font-size: 26px; font-weight: 700; }
.subtitle { color: #94a3b8; font-size: 14px; margin-bottom: 25px; }

.card {
    background: rgba(30,41,59,0.75);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 24px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.22);
    border: 1px solid rgba(255,255,255,0.1);
    margin-bottom: 18px;
    transition: all 0.3s;
}
.card:hover { transform: translateY(-3px); box-shadow: 0 15px 40px rgba(0,0,0,0.3); }

.card-header { display: flex; justify-content: space-between; align-items: flex-start; }

.user-info { display: flex; align-items: flex-start; gap: 14px; }

.avatar {
    width: 52px; height: 52px;
    border-radius: 14px;
    background: linear-gradient(135deg, rgba(56,189,248,0.12), rgba(129,140,248,0.12));
    border: 1px solid rgba(56,189,248,0.2);
    display: flex; justify-content: center; align-items: center;
    font-size: 22px; flex-shrink: 0;
}

.user-info strong { font-size: 17px; font-weight: 600; display: block; margin-bottom: 4px; }

.date-time { font-size: 12px; color: #94a3b8; margin: 5px 0; }

.loc-txt { font-size: 13px; color: #cbd5e1; margin-top: 4px; }

.status {
    background: rgba(34,197,94,0.15);
    color: #4ade80;
    padding: 5px 12px;
    border-radius: 10px;
    font-size: 12px; font-weight: 600;
    border: 1px solid rgba(34,197,94,0.25);
    flex-shrink: 0;
}

.price-row {
    margin-top: 18px; padding-top: 18px;
    border-top: 1px solid rgba(255,255,255,0.08);
    display: flex; justify-content: space-between; align-items: center;
}

.price-val { font-size: 22px; font-weight: 700; color: #38bdf8; }
.txn-tag  { font-size: 11px; color: #64748b; font-weight: 400; background: rgba(255,255,255,0.05); padding: 3px 10px; border-radius: 8px; }

.empty-state {
    text-align: center; padding: 70px 20px; color: #94a3b8;
}
.empty-state .icon { font-size: 55px; margin-bottom: 16px; display: block; }
.empty-state p { font-size: 16px; }
.empty-state a { color: #38bdf8; text-decoration: none; font-weight: 600; }

.home-btn {
    margin-top: 28px; padding: 16px;
    background: linear-gradient(135deg, #38bdf8, #818cf8);
    border: none; border-radius: 16px;
    color: white; font-size: 16px; font-weight: 600;
    cursor: pointer;
    box-shadow: 0 10px 25px rgba(56,189,248,0.3);
    transition: all 0.3s;
    display: block; width: 100%;
}
.home-btn:hover { transform: translateY(-3px); box-shadow: 0 15px 35px rgba(56,189,248,0.5); }
</style>
</head>
<body>

<div class="header">
    <button class="back-btn" onclick="window.location.href='driversearch.html'">← Back</button>
    <div class="logo">🚗</div>
    <button class="profile-btn" onclick="window.location.href='profile.html'">👤 Profile</button>
</div>

<div class="container">
    <h2>My Bookings</h2>
    <p class="subtitle">Your complete ride history</p>
    <div id="bookingList"></div>
    <button class="home-btn" onclick="window.location.href='driversearch.html'">🏠 Book a New Ride</button>
</div>

<script>
let bookings = JSON.parse(localStorage.getItem("userBookings")) || [];

function displayBookings() {
    const list = document.getElementById("bookingList");

    if (bookings.length === 0) {
        list.innerHTML = `
        <div class="empty-state">
            <span class="icon">📋</span>
            <p>No bookings yet.<br><a href="driversearch.html">Book your first ride!</a></p>
        </div>`;
        return;
    }

    /* Show newest first */
    let reversed = [...bookings].reverse();
    list.innerHTML = reversed.map(b => `
    <div class="card">
        <div class="card-header">
            <div class="user-info">
                <div class="avatar">🚗</div>
                <div>
                    <strong>${b.driver || "Driver"}</strong>
                    <div class="date-time">📅 ${b.date || "--"} &nbsp; ⏰ ${b.time || "--"}</div>
                    <div class="loc-txt">📍 ${b.pickup || "--"} → ${b.drop || "--"}</div>
                    ${b.car ? '<div class="loc-txt">🚗 ' + b.car + '</div>' : ''}
                </div>
            </div>
            <div class="status">✅ Paid</div>
        </div>
        <div class="price-row">
            <div class="price-val">₹ ${b.amount || "0"}</div>
            <div class="txn-tag">${b.txnId || "TXN-" + Math.random().toString(36).substr(2,8).toUpperCase()}</div>
        </div>
    </div>`).join("");
}

displayBookings();
</script>

</body>
</html>
