<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Received - Drivers Connect</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
            background-size: 200% 200%;
            animation: bgPan 10s ease infinite;
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        @keyframes bgPan {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .container {
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 440px;
            text-align: center;
            padding: 40px 30px;
            border-radius: 28px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            animation: fadeUp 0.5s ease;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(25px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-icon {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #22c55e, #10b981);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            margin: 0 auto 22px;
            box-shadow: 0 0 35px rgba(34, 197, 94, 0.35);
            animation: scaleUp 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes scaleUp {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        h2 {
            color: #4ade80;
            margin-bottom: 8px;
            font-size: 24px;
            font-weight: 700;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .amount-display {
            font-size: 42px;
            font-weight: 800;
            color: #4ade80;
            margin: 10px 0 22px;
        }

        .details-card {
            background: rgba(15, 23, 42, 0.45);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 22px;
            text-align: left;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 14px;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-row .lbl {
            color: #64748b;
        }

        .detail-row .val {
            color: #f1f5f9;
            font-weight: 500;
        }

        .txn-box {
            background: rgba(56, 189, 248, 0.08);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 12px;
            padding: 13px 18px;
            margin-bottom: 22px;
            text-align: center;
        }

        .txn-label {
            font-size: 11px;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .txn-id {
            font-size: 16px;
            font-weight: 700;
            color: #38bdf8;
            letter-spacing: 1px;
        }

        .booking-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            border: none;
            border-radius: 16px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(56, 189, 248, 0.3);
            transition: all 0.3s;
            margin-top: 5px;
        }

        .booking-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(56, 189, 248, 0.5);
        }

        .home-btn {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            color: #94a3b8;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .home-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="success-icon">✔</div>

        <h2>Payment Received!</h2>
        <p class="subtitle">Your booking is confirmed. Have a safe journey!</p>

        <div class="amount-display" id="amountDisp">₹0</div>

        <div class="txn-box">
            <div class="txn-label">Transaction ID</div>
            <div class="txn-id" id="txnIdDisp">---</div>
        </div>

        <div class="details-card">
            <div class="detail-row"><span class="lbl">Driver</span><span class="val" id="driverDisp">-</span></div>
            <div class="detail-row"><span class="lbl">Pickup</span><span class="val" id="pickupDisp">-</span></div>
            <div class="detail-row"><span class="lbl">Drop</span><span class="val" id="dropDisp">-</span></div>
            <div class="detail-row"><span class="lbl">Date & Time</span><span class="val" id="dtDisp">-</span></div>
            <div class="detail-row"><span class="lbl">Duration</span><span class="val">2 hours</span></div>
            <div class="detail-row"><span class="lbl">Status</span><span class="val" style="color:#4ade80;">✅
                    Paid</span></div>
        </div>

        <button class="home-btn" onclick="window.location.href='customerssearch.html'">back </button>
    </div>

    <script>
        function generateTxnId() {
            return "TXN-" + Math.random().toString(36).substr(2, 4).toUpperCase()
                + "-" + Math.random().toString(36).substr(2, 8).toUpperCase();
        }

        function loadDetails() {
            /* Try getting data from userBookings last entry */
            let bookings = JSON.parse(localStorage.getItem("userBookings")) || [];
            let last = bookings.length > 0 ? bookings[bookings.length - 1] : null;

            let txnId = last?.txnId || generateTxnId();
            let amount = last?.amount || "0";
            let driver = last?.driver || "-";
            let pickup = last?.pickup || "-";
            let drop = last?.drop || "-";
            let date = last?.date || new Date().toLocaleDateString("en-IN");
            let time = last?.time || new Date().toLocaleTimeString("en-IN");

            document.getElementById("amountDisp").innerText = "₹" + amount;
            document.getElementById("txnIdDisp").innerText = txnId;
            document.getElementById("driverDisp").innerText = driver;
            document.getElementById("pickupDisp").innerText = pickup;
            document.getElementById("dropDisp").innerText = drop;
            document.getElementById("dtDisp").innerText = date + " • " + time;
        }

        loadDetails();
    </script>

</body>

</html>
