<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Time Slot</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#f2f4f7;
}

.container{
    width:95%;
    max-width:900px;
    margin:30px auto;
    background:white;
    padding:25px;
    border-radius:20px;
    box-shadow:0 4px 15px rgba(0,0,0,0.05);
}

/* Header */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.header h2{
    margin:0;
}

.week{
    font-size:14px;
    color:#666;
}

/* Date Buttons */
.dates{
    display:flex;
    gap:10px;
    margin:20px 0;
    flex-wrap:wrap;
}

.date-btn{
    padding:12px 18px;
    border-radius:15px;
    background:#eef1f4;
    text-align:center;
    cursor:pointer;
    font-size:14px;
    color:#444;
    border:none;
    transition:0.3s;
}

.date-btn strong{
    display:block;
    font-size:16px;
    margin-top:3px;
}

.date-btn.active{
    background:linear-gradient(135deg,#1fb57a,#1ca3a3);
    color:white;
}

/* Slots */
.slot-title{
    margin:15px 0;
    font-weight:bold;
    color:#555;
}

.slots{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.slot{
    padding:15px;
    border-radius:12px;
    border:1px solid #ddd;
    text-align:center;
    cursor:pointer;
    background:#f9fafb;
    font-weight:500;
    transition:0.3s;
}

.slot:hover{
    border-color:#1fb57a;
}

.slot.selected{
    background:linear-gradient(135deg,#1fb57a,#1ca3a3);
    color:white;
    border:none;
}

/* Button */
.book-btn{
    width:100%;
    margin-top:30px;
    padding:15px;
    border:none;
    border-radius:15px;
    background:linear-gradient(135deg,#1fb57a,#1ca3a3);
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
}

.book-btn:disabled{
    background:#ccc;
    cursor:not-allowed;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h2>Select Time Slot</h2>
        <div class="week">Feb 12 - Feb 18, 2026</div>
    </div>

    <!-- Date Selection -->
    <div class="dates">
        <button class="date-btn active">Thu<strong>12</strong></button>
        <button class="date-btn">Fri<strong>13</strong></button>
        <button class="date-btn">Sat<strong>14</strong></button>
        <button class="date-btn">Sun<strong>15</strong></button>
        <button class="date-btn">Mon<strong>16</strong></button>
        <button class="date-btn">Tue<strong>17</strong></button>
        <button class="date-btn">Wed<strong>18</strong></button>
    </div>

    <div class="slot-title">🕒 Available Time Slots</div>

    <!-- Time Slots -->
    <div class="slots">
        <div class="slot">09:00 - 11:00</div>
        <div class="slot">11:00 - 13:00</div>
        <div class="slot">14:00 - 16:00</div>
        <div class="slot">16:00 - 18:00</div>
        <div class="slot">19:00 - 21:00</div>
    </div>

    <!-- Button -->
            <button class="book-btn" onclick="window.location.href='bookingrequeststatus.html'">send booking request</button>


</div>

<script>

// Date Selection
const dates = document.querySelectorAll(".date-btn");
dates.forEach(date=>{
    date.addEventListener("click", ()=>{
        dates.forEach(d=>d.classList.remove("active"));
        date.classList.add("active");
    });
});

// Slot Selection
const slots = document.querySelectorAll(".slot");
const bookBtn = document.querySelector(".book-btn");

slots.forEach(slot=>{
    slot.addEventListener("click", ()=>{
        slots.forEach(s=>s.classList.remove("selected"));
        slot.classList.add("selected");
        bookBtn.disabled = false;
    });
});

</script>

</body>
</html>
