<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Booking - Drivers Connect</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
            background-size: 200% 200%;
            animation: bgPan 10s ease infinite;
            color: #f8fafc;
            min-height: 100vh;
        }

        @keyframes bgPan {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .header {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(15px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
        }

        .left-header {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 15px;
            border-radius: 12px;
            cursor: pointer;
        }

        .profile-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
        }

        .container {
            width: 90%;
            max-width: 600px;
            margin: 30px auto 50px;
        }

        .section-title {
            font-size: 26px;
            margin-bottom: 25px;
            font-weight: 700;
        }

        .card {
            background: rgba(30, 41, 59, 0.75);
            padding: 28px;
            border-radius: 20px;
            margin-bottom: 22px;
        }

        .driver-info-section {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .driver-img {
            width: 65px;
            height: 65px;
            border-radius: 16px;
            object-fit: cover;
        }

        .driver-name-txt {
            font-weight: 700;
            font-size: 20px;
            margin-bottom: 5px;
        }

        .rate-txt {
            font-size: 15px;
            color: #38bdf8;
        }

        .trip-row {
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .payment-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .total {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            font-size: 20px;
            margin-top: 18px;
        }

        .confirm-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
        }

        /* Waiting overlay */
        .waiting-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.75);
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .waiting-overlay.active {
            display: flex;
        }
        
        .spinner {
            width: 70px; height: 70px;
            border: 5px solid rgba(56,189,248,0.2);
            border-top: 5px solid #38bdf8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>

</head>

<body>

    <div class="waiting-overlay" id="waitingOverlay">
        <div class="spinner"></div>
        <div style="font-size: 20px; font-weight: 600;">⏳ Sending Request...</div>
    </div>

    <div class="header">
        <div class="left-header">
            <button class="back-btn" onclick="history.back()">←</button>
        </div>
        <button class="profile-btn" onclick="window.location.href='profile.html'">👤 Profile</button>
    </div>

    <div class="container">
        <div class="section-title">Confirm Booking</div>

        <!-- Driver Info -->
        <div class="card">
            <div class="driver-info-section">
                <img id="driverImg" src="https://randomuser.me/api/portraits/men/32.jpg" class="driver-img">
                <div>
                    <div class="driver-name-txt" id="driverName">Driver Name</div>
                    <div class="rate-txt" id="rateDisplay">₹0/hour</div>
                </div>
            </div>
        </div>

        <!-- Trip Details -->
        <div class="card">
            <div class="trip-row" id="pickupDisplay">📍 Pickup</div>
            <div class="trip-row" id="dropDisplay">📌 Drop</div>
            <div class="trip-row" id="dateTimeDisplay"></div>
        </div>

        <!-- Payment -->
        <div class="card">
            <div class="payment-row">
                <span>Rate per hour</span>
                <span id="rateValue">₹0</span>
            </div>
            <div class="payment-row">
                <span>Estimated trip</span>
                <span id="hoursValue"></span>
            </div>
            <div class="total">
                <span>Total Amount</span>
                <span id="totalAmount">₹0</span>
            </div>
        </div>

        <button class="confirm-btn" onclick="confirmBooking()">✔ Confirm Booking</button>

    </div>

    <script>
        let ratePerHour = 150;
        let estimatedHours = 0;
        let distanceKm = 0;

        // Custom function to create a pseudo-random hash from strings
        function hashCode(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                let char = str.charCodeAt(i);
                hash = ((hash << 5) - hash) + char;
                hash = hash & hash;
            }
            return Math.abs(hash);
        }

        // Simulating Google Maps Distance & Time calculations
        function calculateDistanceAndTime(pickupLoc, dropLoc) {
            if (!pickupLoc || !dropLoc) {
                distanceKm = 10; // default
                estimatedHours = 1;
                return;
            }
            
            // Generate a consistent pseudo-random number based on the locations to "simulate" a map route
            let combined = pickupLoc.toLowerCase() + dropLoc.toLowerCase();
            let routeSeed = hashCode(combined);
            
            // Ensure distance is between 5 and 65 km
            distanceKm = (routeSeed % 60) + 5;
            
            // Assume an average driving speed of 35 km/hr in traffic
            estimatedHours = distanceKm / 35;
            
            // Round to 1 decimal place (e.g. 1.2 hrs)
            estimatedHours = Math.round(estimatedHours * 10) / 10;
            
            // Ensure a minimum of 1 hour for short trips as a standard baseline
            if (estimatedHours < 1) {
                estimatedHours = 1;
            }
        }

        function loadDriverDetails() {
            let driver = JSON.parse(localStorage.getItem("selectedDriver"));
            let pickup = localStorage.getItem("pickupLocation") || "";
            let drop = localStorage.getItem("dropLocation") || "";

            if (driver) {
                document.getElementById("driverName").innerText = driver.name;
                if(driver.image) document.getElementById("driverImg").src = driver.image;
                ratePerHour = driver.rate || parseInt(driver.price); 
            }

            if (pickup) document.getElementById("pickupDisplay").innerText = "📍 " + pickup;
            if (drop) document.getElementById("dropDisplay").innerText = "📌 " + drop;

            let now = new Date();
            document.getElementById("dateTimeDisplay").innerText =
                "📅 " + now.toLocaleDateString() + " ⏰ " + now.toLocaleTimeString();

            // Calculate "Google Map" routed distance and time dynamically
            calculateDistanceAndTime(pickup, drop);
            calculateTotal();
        }

        function calculateTotal() {
            let total = Math.round(ratePerHour * estimatedHours);

            document.getElementById("rateDisplay").innerText = "₹" + ratePerHour + "/hour";
            document.getElementById("rateValue").innerText = "₹" + ratePerHour;
            document.getElementById("hoursValue").innerText =
                estimatedHours + " hrs (" + distanceKm + " km)";
            document.getElementById("totalAmount").innerText = "₹" + total;
        }

        function confirmBooking() {
            document.getElementById("waitingOverlay").classList.add("active");

            // Random 65% accept / 35% reject as requested
            const isAccepted = Math.random() < 0.65;
            
            // We still store a booking record before randomly determining outcome
            let allBookings = JSON.parse(localStorage.getItem("userBookings")) || [];
            let driver = JSON.parse(localStorage.getItem("selectedDriver"));
            let pickup = localStorage.getItem("pickupLocation");
            let drop = localStorage.getItem("dropLocation");
            let loggedCustomer = JSON.parse(localStorage.getItem("loggedUser")) || {};
            
            let booking = {
                txnId: "TXN-" + Math.random().toString(36).substr(2, 8).toUpperCase(),
                customerName: loggedCustomer.name || "Guest Customer",
                driver: driver ? driver.name : "Unknown",
                pickup: pickup,
                drop: drop,
                date: new Date().toLocaleDateString("en-IN"),
                amount: Math.round(ratePerHour * estimatedHours),
                status: isAccepted ? "accepted" : "rejected"
            };
            allBookings.push(booking);
            localStorage.setItem("userBookings", JSON.stringify(allBookings));

            setTimeout(() => {
                document.getElementById("waitingOverlay").classList.remove("active");
                if (isAccepted) {
                    window.location.href = "requestaccepted.html";
                } else {
                    window.location.href = "requestrejected.html";
                }
            }, 3000);
        }

        loadDriverDetails();
    </script>

</body>
</html>
