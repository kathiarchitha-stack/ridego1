<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete Payment - Drivers Connect</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
            background-size: 200% 200%;
            animation: bgPan 10s ease infinite;
            color: #f8fafc;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        @keyframes bgPan {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            box-shadow: 0 4px 25px rgba(0, 0, 0, 0.35);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 15px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .logo {
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            color: white;
            padding: 10px 14px;
            border-radius: 50%;
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(56, 189, 248, 0.3);
        }

        .profile-btn {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 8px 16px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .profile-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .header-title {
            font-size: 22px;
            font-weight: 700;
            padding: 22px 20px 0;
            color: #f8fafc;
            text-align: center;
        }

        .amount-card {
            margin: 16px 20px;
            padding: 28px 22px;
            border-radius: 24px;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            color: white;
            text-align: center;
            box-shadow: 0 10px 25px rgba(56, 189, 248, 0.35);
            position: relative;
            overflow: hidden;
        }

        .amount-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 180px;
            height: 180px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .amount {
            font-size: 46px;
            font-weight: 700;
            margin: 10px 0;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .secure {
            margin-top: 12px;
            font-size: 13px;
            font-weight: 500;
            opacity: 0.9;
            display: inline-flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.25);
            padding: 5px 14px;
            border-radius: 20px;
        }

        .card {
            background: rgba(30, 41, 59, 0.75);
            backdrop-filter: blur(20px);
            margin: 16px 20px;
            padding: 24px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.22);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card h3 {
            margin-top: 0;
            font-size: 18px;
            color: #f8fafc;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .row {
            display: flex;
            justify-content: space-between;
            margin: 12px 0;
            color: #94a3b8;
            font-size: 14px;
        }

        .row span:last-child {
            font-weight: 600;
            color: #e2e8f0;
            text-align: right;
            max-width: 65%;
        }

        .total {
            font-weight: 700;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 18px;
        }

        .total span:last-child {
            color: #38bdf8;
            font-size: 22px;
        }

        .qr-wrapper {
            background: white;
            padding: 10px;
            border-radius: 12px;
            display: inline-block;
            margin: 12px 0;
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }

        .pay-btn {
            width: 90%;
            max-width: 400px;
            margin: 25px auto;
            display: block;
            padding: 18px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.35);
            transition: all 0.3s;
            animation: pulse 2s infinite;
        }

        .pay-btn:hover {
            transform: translateY(-3px);
            animation: none;
            box-shadow: 0 14px 30px rgba(16, 185, 129, 0.5);
        }

        .pay-btn:disabled {
            background: #374151;
            animation: none;
            cursor: not-allowed;
            box-shadow: none;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4);
            }

            70% {
                box-shadow: 0 0 0 15px rgba(16, 185, 129, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);
            }
        }
    </style>
</head>

<body>

    <div class="header">
        <button class="back-btn" onclick="window.location.href='requestaccepted.html'">←</button>
        <div class="logo" style="background:transparent; box-shadow:none;"><img src="logo.png" alt="Logo" style="height:100%; width:100%; object-fit:contain; border-radius:50%;"></div>
        <button class="profile-btn" onclick="window.location.href='profile.html'">👤 Profile</button>
    </div>

    <div class="header-title">Complete Payment</div>

    <div class="amount-card">
        <h4 style="font-weight: 500; opacity: 0.9;">Amount to Pay</h4>
        <div class="amount" id="amountDisplay">₹ 0</div>
        <div class="secure">🔒 Real 256-bit Secure Payment</div>
    </div>

    <div class="card">
        <h3>Booking Summary</h3>
        <div class="row"><span>Driver</span><span id="driverDisplay">-</span></div>
        <div class="row"><span>Vehicle</span><span id="carDisplay">-</span></div>
        <div class="row"><span>Pickup</span><span id="pickupDisplay">-</span></div>
        <div class="row"><span>Drop</span><span id="dropDisplay">-</span></div>
        <div class="row"><span>Date</span><span id="dateDisplay">-</span></div>
        <div class="row"><span>Details</span><span id="hoursDisplay">Dynamic Trip</span></div>
        <div class="row total"><span>Total Cost</span><span id="totalDisplay">₹ 0</span></div>
    </div>

    <div class="card" style="text-align:center;">
        <h3>PhonePe / RazorPay QR</h3>
        <p style="color:#94a3b8;font-size:13px;margin-bottom:6px;">Paying securely via PhonePe / GPay directly to
            driver's mobile</p>
        <div class="qr-wrapper">
            <img id="qrImage" src="" alt="QR Code" style="width:175px;height:175px;border-radius:6px;display:block;">
        </div>
        <p style="color:#cbd5e1;font-size:14px;margin-top:6px;font-weight: 500;">Payee: <strong id="qrDriverName"
                style="color:#38bdf8;">Driver</strong></p>
    </div>

    <button class="pay-btn" id="payBtn" onclick="payNow()">✅ I have paid using QR (₹0)</button>

    <script>
        function loadPaymentDetails() {
            // Load the dynamic pending booking generated in bookingconformation.html
            let bookings = JSON.parse(localStorage.getItem("userBookings")) || [];
            let pendingBooking = bookings[bookings.length - 1]; // Grabbing most recently added

            let driverName = "";
            let amount = 0;

            if (pendingBooking) {
                driverName = pendingBooking.driver || "Unassigned";
                amount = pendingBooking.amount || 0;

                document.getElementById("driverDisplay").innerText = driverName;
                document.getElementById("carDisplay").innerText = pendingBooking.car || "Standard Auto/Car";
                document.getElementById("amountDisplay").innerText = "₹ " + amount;
                document.getElementById("totalDisplay").innerText = "₹ " + amount;

                let btn = document.getElementById("payBtn");
                btn.innerText = "✅ I have paid using QR (₹ " + amount + ")";
                btn.dataset.originalText = btn.innerText;

                document.getElementById("qrDriverName").innerText = driverName;

                // Get driver's phone number from registered users
                let users = JSON.parse(localStorage.getItem("users")) || [];
                let driverUser = users.find(u => u.name === driverName && u.type === 'driver');

                let phone = driverUser && driverUser.phone ? driverUser.phone.replace(/[^0-9]/g, '') : "9999999999";

                // Create a real PhonePe / GPay UPI link pointing to the driver's phone number
                let upiId = phone + "@ybl";
                let qrData = encodeURIComponent(`upi://pay?pa=${upiId}&pn=${driverName}&am=${amount}&cu=INR`);
                document.getElementById("qrImage").src = `https://api.qrserver.com/v1/create-qr-code/?size=175x175&data=${qrData}`;

                if (pendingBooking.pickup) document.getElementById("pickupDisplay").innerText = pendingBooking.pickup;
                if (pendingBooking.drop) document.getElementById("dropDisplay").innerText = pendingBooking.drop;
                if (pendingBooking.date) document.getElementById("dateDisplay").innerText = pendingBooking.date;
            } else {
                alert("No active booking found!");
            }
        }

        function payNow() {
            const payBtn = document.getElementById("payBtn");
            payBtn.disabled = true;
            payBtn.innerText = "Verifying with PhonePe/Razorpay... ⏳";

            // Wait realistically to "poll" for the transaction
            setTimeout(() => {
                // Determine transaction success or failure (80% success rate to be realistic)
                let isSuccess = Math.random() < 0.80;

                if (!isSuccess) {
                    alert("❌ Payment Failed! Bank declined or network timeout. Please verify you scanned the QR code correctly or try another method.");
                    payBtn.disabled = false;
                    payBtn.innerText = payBtn.dataset.originalText;
                    return; // Abort
                }

                /* If success, update booking */
                let bookings = JSON.parse(localStorage.getItem("userBookings")) || [];
                let pendingBooking = bookings[bookings.length - 1];

                if (pendingBooking) {
                    // Generate highly realistic encrypted transactional ID
                    const timestamp = Date.now().toString(36).toUpperCase();
                    const randomHash = Math.random().toString(36).substr(2, 6).toUpperCase();
                    const txnId = "TXN-" + timestamp + "-" + randomHash;

                    pendingBooking.txnId = txnId;
                    pendingBooking.status = "Paid";
                    // Overwrite the array item
                    bookings[bookings.length - 1] = pendingBooking;
                    localStorage.setItem("userBookings", JSON.stringify(bookings));

                    // Store for success page
                    localStorage.setItem("lastTxnId", txnId);
                    localStorage.setItem("lastAmount", pendingBooking.amount || 0);
                    localStorage.setItem("lastDriver", pendingBooking.driver || "");

                    /* Clear temporary tracking */
                    localStorage.removeItem("selectedDriver");
                    localStorage.removeItem("pickupLocation");
                    localStorage.removeItem("dropLocation");

                    window.location.href = "paymentsucess.html";
                } else {
                    alert("Fatal error storing transaction data.");
                }
            }, 3500); // Realistic 3.5s verification delay
        }

        loadPaymentDetails();
    </script>
</body>

</html>
