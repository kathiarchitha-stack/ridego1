<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Complete Payment - Drivers Connect</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

body {
    background: #f4f6f8;
    background-image: radial-gradient(circle at top right, #e0e7ff 0%, #f4f6f8 100%);
    padding-bottom: 40px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 20px;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(10px);
    box-shadow: 0 4px 15px rgba(0,0,0,0.06);
    position: sticky; top: 0; z-index: 100;
}

.back-btn {
    background: #f1f5f9;
    border: none;
    padding: 9px 14px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 16px;
    transition: all 0.3s;
}
.back-btn:hover { background: #e2e8f0; }

.logo {
    background: linear-gradient(135deg, #6366f1, #a855f7);
    color: white;
    padding: 10px 14px;
    border-radius: 50%;
    font-size: 20px;
    box-shadow: 0 4px 10px rgba(99,102,241,0.3);
}

.profile-btn {
    background: linear-gradient(135deg, #6366f1, #a855f7);
    color: white;
    border: none;
    padding: 9px 16px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    transition: all 0.3s;
}
.profile-btn:hover { transform: translateY(-2px); }

.header-title {
    font-size: 22px; font-weight: 700;
    padding: 18px 20px 0;
    color: #0f172a;
    text-align: center;
}

.amount-card {
    margin: 16px 20px;
    padding: 28px 22px;
    border-radius: 24px;
    background: linear-gradient(135deg, #6366f1, #a855f7);
    color: white;
    text-align: center;
    box-shadow: 0 10px 25px rgba(99,102,241,0.4);
    position: relative; overflow: hidden;
}
.amount-card::before {
    content: '';
    position: absolute;
    top: -50%; right: -20%;
    width: 180px; height: 180px;
    background: rgba(255,255,255,0.1);
    border-radius: 50%;
}

.amount { font-size: 46px; font-weight: 700; margin: 10px 0; }
.secure {
    margin-top: 12px; font-size: 13px; font-weight: 500; opacity: 0.9;
    display: inline-flex; align-items: center;
    background: rgba(255,255,255,0.2);
    padding: 4px 12px; border-radius: 20px;
}

.card {
    background: rgba(255,255,255,0.97);
    margin: 16px 20px;
    padding: 22px;
    border-radius: 20px;
    box-shadow: 0 6px 20px rgba(0,0,0,0.06);
    border: 1px solid rgba(255,255,255,0.5);
}

.card h3 { margin-top: 0; font-size: 17px; color: #1e293b; margin-bottom: 18px; }

.row { display: flex; justify-content: space-between; margin: 11px 0; color: #64748b; font-size: 14px; }
.row span:last-child { font-weight: 600; color: #0f172a; text-align: right; max-width: 60%; }

.total {
    font-weight: 700; margin-top: 14px; padding-top: 14px;
    border-top: 2px dashed #e2e8f0; font-size: 17px;
}
.total span:last-child { color: #6366f1; font-size: 21px; }

.pay-btn {
    width: 90%; margin: 20px auto; display: block;
    padding: 16px; border: none; border-radius: 16px;
    background: linear-gradient(135deg, #10b981, #059669);
    color: white; font-size: 17px; font-weight: 700;
    cursor: pointer;
    box-shadow: 0 10px 25px rgba(16,185,129,0.4);
    transition: all 0.3s;
    animation: pulse 2s infinite;
}
.pay-btn:hover { transform: translateY(-2px); animation: none; box-shadow: 0 14px 30px rgba(16,185,129,0.5); }
.pay-btn:disabled { background: #94a3b8; animation: none; cursor: not-allowed; box-shadow: none; }

@keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
    70%  { box-shadow: 0 0 0 15px rgba(16,185,129,0); }
    100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
}
</style>
</head>
<body>

<div class="header">
    <button class="back-btn" onclick="window.location.href='requestaccepted.html'">←</button>
    <div class="logo">🚗</div>
    <button class="profile-btn" onclick="window.location.href='profile.html'">👤 Profile</button>
</div>

<div class="header-title">Complete Payment</div>

<div class="amount-card">
    <h4>Amount to Pay</h4>
    <div class="amount" id="amountDisplay">₹ 0</div>
    <div class="secure">🔒 Secure Payment</div>
</div>

<div class="card">
    <h3>Booking Summary</h3>
    <div class="row"><span>Driver</span><span id="driverDisplay">-</span></div>
    <div class="row"><span>Vehicle</span><span id="carDisplay">-</span></div>
    <div class="row"><span>Pickup</span><span id="pickupDisplay">-</span></div>
    <div class="row"><span>Drop</span><span id="dropDisplay">-</span></div>
    <div class="row"><span>Date</span><span id="dateDisplay">-</span></div>
    <div class="row"><span>Time</span><span id="timeDisplay">-</span></div>
    <div class="row"><span>Hours</span><span id="hoursDisplay">2 hrs</span></div>
    <hr style="border-color:#e2e8f0; margin:10px 0;">
    <div class="row total"><span>Total</span><span id="totalDisplay">₹ 0</span></div>
</div>

<div class="card" style="text-align:center;">
    <h3>Pay via QR Code</h3>
    <img id="qrImage" src="" alt="QR Code" style="width:175px;height:175px;margin:12px 0;border-radius:10px;box-shadow:0 0 12px rgba(0,0,0,0.1);">
    <p style="color:#64748b;font-size:13px;margin-top:6px;">Scan to pay <strong id="qrDriverName">the driver</strong> directly.</p>
</div>

<button class="pay-btn" id="payBtn" onclick="payNow()">✅ I have paid using QR (₹0)</button>

<script>
function loadPaymentDetails() {
    let driver = JSON.parse(localStorage.getItem("selectedDriver"));
    let pickup = localStorage.getItem("pickupLocation");
    let drop   = localStorage.getItem("dropLocation");
    let hours  = 2;

    if (driver) {
        document.getElementById("driverDisplay").innerText = driver.name;
        document.getElementById("carDisplay").innerText    = driver.car || "Standard Car";
        let total = driver.rate * hours;
        document.getElementById("amountDisplay").innerText = "₹ " + total;
        document.getElementById("totalDisplay").innerText  = "₹ " + total;
        document.getElementById("payBtn").innerText        = "✅ I have paid using QR (₹ " + total + ")";

        document.getElementById("qrDriverName").innerText = driver.name;
        let upiId  = driver.upi || driver.name.toLowerCase().replace(/\s/g,"") + "@ybl";
        let qrData = encodeURIComponent(`upi://pay?pa=${upiId}&pn=${driver.name}&am=${total}&cu=INR`);
        document.getElementById("qrImage").src = `https://api.qrserver.com/v1/create-qr-code/?size=175x175&data=${qrData}`;

        /* Store booking data for saving after payment */
        let now = new Date();
        localStorage.setItem("pendingBooking", JSON.stringify({
            driver: driver.name,
            car:    driver.car || "",
            pickup: pickup || "",
            drop:   drop   || "",
            amount: total,
            date:   now.toLocaleDateString("en-IN"),
            time:   now.toLocaleTimeString("en-IN"),
            hours:  hours
        }));
    }

    if (pickup) document.getElementById("pickupDisplay").innerText = pickup;
    if (drop)   document.getElementById("dropDisplay").innerText   = drop;

    let now = new Date();
    document.getElementById("dateDisplay").innerText = now.toLocaleDateString("en-IN");
    document.getElementById("timeDisplay").innerText = now.toLocaleTimeString("en-IN");
}

function payNow() {
    const payBtn = document.getElementById("payBtn");
    payBtn.disabled  = true;
    payBtn.innerText = "Verifying Payment... ⏳";

    setTimeout(() => {
        /* Save booking to userBookings */
        let pending  = JSON.parse(localStorage.getItem("pendingBooking")) || {};
        let bookings = JSON.parse(localStorage.getItem("userBookings"))   || [];

        /* Generate random transaction ID */
        const txnId = "TXN-" + Math.random().toString(36).substr(2,4).toUpperCase() + "-" + Math.random().toString(36).substr(2,8).toUpperCase();
        pending.txnId = txnId;
        pending.status = "Paid";

        bookings.push(pending);
        localStorage.setItem("userBookings", JSON.stringify(bookings));
        localStorage.setItem("lastTxnId", txnId);
        localStorage.setItem("lastAmount", pending.amount || 0);
        localStorage.setItem("lastDriver", pending.driver || "");

        /* Don't clear all - just selected driver & locations */
        localStorage.removeItem("selectedDriver");
        localStorage.removeItem("pickupLocation");
        localStorage.removeItem("dropLocation");
        localStorage.removeItem("pendingBooking");

        window.location.href = "paymentsucess.html";
    }, 3000);
}

loadPaymentDetails();
</script>

</body>
</html>
