<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request Pending</title>

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#f4f6f8;
}

/* Header */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:15px 20px;
    background:white;
    box-shadow:0 2px 5px rgba(0,0,0,0.05);
}

.icon-btn{
    background:#f0f0f0;
    border:none;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
}

.icon-btn:hover{
    background:#e0e0e0;
}

/* Status Card */
.status-card{
    background:white;
    margin:30px auto;
    width:90%;
    max-width:700px;
    border-radius:15px;
    padding:40px 20px;
    text-align:center;
    box-shadow:0 4px 15px rgba(0,0,0,0.05);
}

.status-icon{
    width:70px;
    height:70px;
    background:#ffe9b3;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0 auto 20px;
    font-size:28px;
}

.status-card h2{
    margin:0;
    color:#333;
}

.status-card p{
    color:#666;
    margin-top:10px;
}

/* Booking Details */
.details-card{
    background:white;
    margin:20px auto;
    width:90%;
    max-width:700px;
    border-radius:15px;
    padding:20px;
    box-shadow:0 4px 15px rgba(0,0,0,0.05);
}

.details-card h3{
    margin-bottom:15px;
}

.detail-row{
    display:flex;
    justify-content:space-between;
    padding:12px 0;
    border-bottom:1px solid #eee;
}

.detail-row:last-child{
    border-bottom:none;
}

.label{
    color:#777;
}

.value{
    color:#333;
    font-weight:500;
}

/* Amount */
.amount{
    font-size:18px;
    font-weight:bold;
    color:#0a8f5a;
}

/* Button */
.main-btn{
    display:block;
    width:90%;
    max-width:700px;
    margin:20px auto 40px;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#0a8f5a;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.main-btn:hover{
    background:#087a4c;
}
</style>
</head>

<body>

<!-- Header -->
<div class="header">
    <button class="icon-btn">←</button>
    <button class="icon-btn">👤</button>
</div>

<!-- Status -->
<div class="status-card">
    <div class="status-icon">⏳</div>
    <h2>Request Pending</h2>
    <p>Waiting for driver to accept your booking request.</p>
</div>

<!-- Booking Details -->
<div class="details-card">
    <h3>Booking Details</h3>

    <div class="detail-row">
        <div class="label">Driver</div>
        <div class="value">Not Assigned</div>
    </div>

    <div class="detail-row">
        <div class="label">Pickup</div>
        <div class="value">MG Road, Bangalore</div>
    </div>

    <div class="detail-row">
        <div class="label">Drop</div>
        <div class="value">Electronic City, Bangalore</div>
    </div>

    <div class="detail-row">
        <div class="label">Date</div>
        <div class="value">15 Feb 2026</div>
    </div>

    <div class="detail-row">
        <div class="label">Time</div>
        <div class="value">10:30 AM</div>
    </div>

    <div class="detail-row">
        <div class="label">Total Amount</div>
        <div class="amount">₹450</div>
    </div>
</div>

<!-- View All Bookings Button -->
<button class="main-btn">View All Bookings</button>

</body>
</html>
