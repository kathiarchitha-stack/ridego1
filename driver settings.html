<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Driver Settings</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f6fa;
}

.container {
    width: 90%;
    max-width: 1000px;
    margin: 30px auto;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.header h2 {
    margin: 0;
}

.edit-btn {
    padding: 8px 16px;
    background: #28a745;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.edit-btn:hover {
    background: #218838;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    margin-bottom: 20px;
}

.profile {
    display: flex;
    align-items: center;
    gap: 15px;
}

.profile-icon {
    width: 70px;
    height: 70px;
    background: #d4f4e1;
    border-radius: 12px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 30px;
    color: #28a745;
}

.profile-info h3 {
    margin: 0;
}

.stats {
    display: flex;
    justify-content: space-between;
    margin-top: 25px;
    text-align: center;
}

.stat h3 {
    margin: 0;
    font-size: 24px;
}

.stat p {
    margin: 5px 0 0;
    color: gray;
}

.vehicle-types {
    margin-top: 20px;
}

.vehicle-types button {
    padding: 6px 14px;
    margin-right: 10px;
    border: 1px solid #ccc;
    background: white;
    border-radius: 6px;
    cursor: pointer;
}

.bank-section {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.link-btn {
    padding: 8px 16px;
    background: #007bff;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

.link-btn:hover {
    background: #0069d9;
}

.signout-btn {
    width: 100%;
    padding: 12px;
    border: 1px solid #dc3545;
    background: white;
    color: #dc3545;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.signout-btn:hover {
    background: #dc3545;
    color: white;
}
</style>
</head>

<body>

<div class="container">

    <div class="header">
        <h2>Driver Settings</h2>
        <button class="edit-btn" onclick="editProfile()">Edit</button>
    </div>

    <div class="card">
        <div class="profile">
            <div class="profile-icon">👤</div>
            <div class="profile-info">
                <h3 id="driverName">Architha Kathi</h3>
                <small id="driverId">ID: 234</small>
            </div>
        </div>

        <div class="stats">
            <div class="stat">
                <h3 id="rate">₹34</h3>
                <p>Per Hour</p>
            </div>
            <div class="stat">
                <h3 id="experience">1</h3>
                <p>Years Exp</p>
            </div>
            <div class="stat">
                <h3 id="trips">0</h3>
                <p>Total Trips</p>
            </div>
        </div>

        <div class="vehicle-types">
            <p><strong>Vehicle Types</strong></p>
            <button>2-Wheeler</button>
            <button>4-Wheeler</button>
        </div>
    </div>

    <div class="card bank-section">
        <div>
            <h4>Bank Account</h4>
            <small id="bankStatus">Not Linked</small>
        </div>
        <button class="link-btn" onclick="linkBank()">Link</button>
    </div>

    <button class="signout-btn" onclick="signOut()">Sign Out</button>

</div>

<script>
// Profile Data (Dynamic)
let profile = {
    name: "Architha Kathi",
    id: 234,
    rate: 34,
    experience: 1,
    trips: 0,
    bankLinked: false
};

function loadProfile() {
    document.getElementById("driverName").innerText = profile.name;
    document.getElementById("driverId").innerText = "ID: " + profile.id;
    document.getElementById("rate").innerText = "₹" + profile.rate;
    document.getElementById("experience").innerText = profile.experience;
    document.getElementById("trips").innerText = profile.trips;
    document.getElementById("bankStatus").innerText = 
        profile.bankLinked ? "Linked Successfully" : "Not Linked";
}

function editProfile() {
    let newRate = prompt("Enter new rate per hour:", profile.rate);
    let newExp = prompt("Enter years of experience:", profile.experience);
    let newTrips = prompt("Enter total trips:", profile.trips);

    if(newRate !== null) profile.rate = newRate;
    if(newExp !== null) profile.experience = newExp;
    if(newTrips !== null) profile.trips = newTrips;

    loadProfile();
}

function linkBank() {
    profile.bankLinked = true;
    loadProfile();
    alert("Bank Account Linked Successfully!");
}

function signOut() {
    alert("Signed Out Successfully!");
}

loadProfile();
</script>

</body>
</html>
