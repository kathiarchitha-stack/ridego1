<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Dashboard</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f3f5f7;
        }

        /* Header */
        .header {
            height: 70px;
            background: #ffffff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
        }

        .circle-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
        }

        .center-logo {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: #20b486;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(32, 180, 134, 0.4);
        }

        /* Container */
        .container {
            padding: 30px;
        }

        /* Dashboard Card */
        .dashboard-card {
            background: linear-gradient(90deg, #20b486, #1fa2a6);
            color: white;
            border-radius: 25px;
            padding: 30px;
        }

        .top-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Online Toggle Button */
        .online-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            background: #000;
            color: white;
            transition: 0.3s;
        }

        .online-btn.active {
            background: #22c55e;
        }

        .stats {
            display: flex;
            gap: 20px;
            margin-top: 25px;
        }

        .stat-box {
            flex: 1;
            background: rgba(255, 255, 255, 0.15);
            padding: 20px;
            border-radius: 15px;
        }

        .stat-box h4 {
            font-weight: normal;
            font-size: 14px;
            margin-bottom: 10px;
        }

        .stat-box h2 {
            font-size: 24px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 15px;
            margin: 25px 0;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            background: #e5e7eb;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .tab-btn.active {
            background: #20b486;
            color: white;
        }

        /* Content Area */
        .content-box {
            background: white;
            border-radius: 20px;
            padding: 60px;
            text-align: center;
            color: #6b7280;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
        }
    </style>

</head>

<body>

    <!-- Header -->
    <div class="header">
        <div class="circle-icon">👤</div>
        <div class="center-logo">🚗</div>
        <div class="circle-icon">⚙</div>
    </div>

    <div class="container">

        <!-- Green Card -->
        <div class="dashboard-card">

            <div class="top-row">
                <div>
                    <h2>Hello..</h2>
                    <p>Verification Pending</p>
                </div>

                <button id="onlineBtn" class="online-btn">
                    Offline
                </button>
            </div>

            <div class="stats">
                <div class="stat-box">
                    <h4>Today's Earnings</h4>
                    <h2>₹0</h2>
                </div>

                <div class="stat-box">
                    <h4>Pending Requests</h4>
                    <h2>0</h2>
                </div>
            </div>

        </div>

        <!-- Tabs Buttons -->
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('requests')">Requests</button>
            <button class="tab-btn" onclick="switchTab('active')">Active</button>
            <button class="tab-btn" onclick="switchTab('history')">History</button>
        </div>

        <!-- Content Area -->
        <div id="content" class="content-box">
            No bookings in Requests
        </div>

    </div>

    <script>

        /* ONLINE TOGGLE */
        const onlineBtn = document.getElementById("onlineBtn");

        onlineBtn.addEventListener("click", function () {
            onlineBtn.classList.toggle("active");

            if (onlineBtn.classList.contains("active")) {
                onlineBtn.innerText = "Online";
            } else {
                onlineBtn.innerText = "Offline";
            }
        });

        /* TAB SWITCHING */
        function switchTab(tab) {

            const buttons = document.querySelectorAll(".tab-btn");
            buttons.forEach(btn => btn.classList.remove("active"));

            event.target.classList.add("active");

            const content = document.getElementById("content");

            if (tab === "transactions") {
                content.innerHTML = "No transactions available";
            }
            else if (tab === "active") {
                content.innerHTML = "No Active bookings";
            }
            else if (tab === "history") {
                content.innerHTML = "No booking history available";
            }
        }

    </script>

</body>

</html>
